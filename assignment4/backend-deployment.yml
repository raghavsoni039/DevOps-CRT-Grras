apiVersion: v1
kind: Deployment
metadata: 
  name: backend-deplyment
  namespace: two-tier-app
spec: 
  replicas: 2
  selector: 
    matchLabels:
      app: bakend
  template: 
    metadata:
      labels:
        app:backend
    spec: 
      containers:
        - name: backend
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Hello from backed"
          ports: 
          - containerPort: 5678 

