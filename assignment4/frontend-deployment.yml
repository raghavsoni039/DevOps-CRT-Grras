apiVersion: v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: two-tier-app
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: frontend
    template:
      metadata:
        labels:
          app: frontend
      spec:
        containers:
          - name: frontend
            image: nginx:1.25
            ports:
            - containerPort: 80
